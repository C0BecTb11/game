<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Urban Tactics</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="main-menu">
        <h1>Urban Tactics</h1>
        <p>Командир, выберите зону высадки:</p>
        <button id="btn-main-map" class="btn-primary">Основная карта (30x30)</button>
        <button id="btn-test-map" style="background-color: #f57c00; border-color: #e65100;">Тестовый полигон (10x10)</button>
    </div>

    <div id="game-container" class="hidden">
        <header id="top-bar">
            <div class="player-stat player-1">Красные: <span id="p1-points">100</span> 💰</div>
            <div id="turn-indicator" class="turn-p1">Ход Игрока 1</div>
            <div class="player-stat player-2">Синие: <span id="p2-points">100</span> 💰</div>
        </header>

        <div id="main-area">
            <div class="canvas-wrapper">
                <canvas id="gameCanvas" width="600" height="600"></canvas>
                
                <div id="camera-controls">
                    <button id="zoom-in">➕</button>
                    <button id="zoom-out">➖</button>
                </div>
            </div>

            <aside id="shop">
                <div id="unit-info" class="hidden">
                    <div id="ui-name">Пехота</div>
                    <div class="ui-stats">
                        <div title="Здоровье">❤️ <span id="ui-hp">10/10</span></div>
                        <div title="Урон">⚔️ <span id="ui-atk">2</span></div>
                        <div title="Дальность хода">🏃 <span id="ui-move">2</span></div>
                        <div title="Дальность стрельбы">🎯 <span id="ui-range">1</span></div>
                    </div>
                </div>

                <h3>Штаб (Заказ войск)</h3>
                <div class="shop-items">
                    <button id="buy-soldier">Пехота (50)</button>
                    <button id="buy-rpk">Пулемет (80)</button>
                    <button id="buy-rpg">Гранатомет (100)</button>
                    <button id="buy-supply">Снабжение (120)</button>
                    <button id="buy-btr">БТР (250)</button>
                    <button id="buy-tank">Танк (500)</button>
                </div>
                <button id="end-turn" class="btn-primary">Завершить ход</button>
            </aside>
        </div>
    </div>

    <script src="unit.js"></script>
    <script src="map.js"></script>
    <script src="game.js"></script>
</body>
</html>
