<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Urban Tactics</title>
    <link rel="stylesheet" href="style.css?v=2">
</head>
<body>
    <div id="main-menu">
        <h1>Urban Tactics</h1>
        <p>Командир, подключитесь к серверу:</p>

        <div style="border: 1px solid #115293; padding: 15px; border-radius: 8px; width: 320px; text-align: center; background-color: rgba(25, 118, 210, 0.1);">
            <h3 style="color: #64b5f6; margin-bottom: 10px;">Онлайн игра</h3>
            <button id="btn-create-online" class="btn-primary" style="background-color: #1976d2; border-color: #115293; width: 100%; margin-bottom: 10px;">Создать новую игру</button>
            
            <div style="display: flex; gap: 5px;">
                <input type="number" id="join-lobby-id" placeholder="Код игры" style="flex: 1; padding: 10px; border-radius: 5px; border: 1px solid #555; background: #222; color: white;">
                <button id="btn-join-online" style="background-color: #388e3c; border-color: #2e7d32; padding: 10px 20px; border-radius: 5px; color: white; cursor: pointer;">Войти</button>
            </div>
        </div>

        <button id="btn-menu-help" style="margin-top: 20px; background-color: #444; padding: 10px 20px; border-radius: 5px; color: white; border: 1px solid #666; cursor: pointer;">📖 Полевой Устав</button>
    </div>

    <div id="game-container" class="hidden">
        <header id="top-bar">
            <div class="player-stat player-1">Красные: <span id="p1-points">100</span> 💰</div>
            <div id="turn-indicator" class="turn-p1">ОЖИДАНИЕ...</div>
            <div class="player-stat player-2">Синие: <span id="p2-points">100</span> 💰</div>
            <button id="btn-game-help" title="Энциклопедия" style="background: none; border: none; font-size: 1.5rem; cursor: pointer;">📖</button>
        </header>

        <div id="main-area">
            <div class="canvas-wrapper">
                <canvas id="gameCanvas" width="600" height="600"></canvas>
                <div id="combat-notification" class="hidden">
                    💥 Урон: <span id="notif-dmg">0</span> | 🎯 <span id="notif-hp">Осталось: 0</span>
                </div>
                <div id="camera-controls">
                    <button id="zoom-in">➕</button>
                    <button id="zoom-out">➖</button>
                </div>
            </div>

            <aside id="shop">
                <div id="unit-info" class="hidden">
                    <div id="ui-name">Пехота</div>
                    <div class="ui-stats">
                        <div title="Здоровье">❤️ <span id="ui-hp">10/10</span></div>
                        <div title="Урон">⚔️ <span id="ui-atk">2</span></div>
                        <div title="Дальность хода">🏃 <span id="ui-move">2</span></div>
                        <div title="Дальность стрельбы">🎯 <span id="ui-range">1</span></div>
                    </div>
                </div>

                <h3>Штаб (Заказ)</h3>
                <div class="shop-items">
                    <button id="buy-soldier">Пехота (50)</button>
                    <button id="buy-rpk">Пулемет (80)</button>
                    <button id="buy-rpg">Гранатомет (100)</button>
                    <button id="buy-supply">Снабжение (120)</button>
                    <button id="buy-btr">БТР (250)</button>
                    <button id="buy-tank">Танк (500)</button>
                </div>
                <button id="end-turn" class="btn-primary">Завершить ход</button>
            </aside>
        </div>
    </div>

    <div id="encyclopedia-modal" class="hidden">
        <div class="modal-content">
            <button id="btn-close-help" class="close-btn">❌</button>
            <h2>📖 ПОЛЕВОЙ УСТАВ</h2>
            <p style="text-align: center;">Правила игры...</p>
        </div>
    </div>

    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="db.js?update=200"></script>
    <script src="unit.js?update=200"></script>
    <script src="map.js?update=200"></script>
    <script src="game.js?update=200"></script>
</body>
</html>
